<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuiteService · App do Técnico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a3d62;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .app-container {
            background: white;
            border-radius: 36px;
            padding: 28px 20px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            background: #0a3d62;
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
        }
        .tecnico-info {
            background: #f4f7fc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .select-tecnico {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            background: white;
            margin-bottom: 12px;
        }
        .os-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .status-badge {
            background: #e8f0fe;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-weight: 500;
            color: #0a3d62;
            margin-bottom: 20px;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 18px;
            border: none;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: #0a3d62;
            color: white;
        }
        .btn-primary:active {
            background: #1e5a7e;
        }
        .btn-secondary {
            background: #f59e0b;
            color: white;
        }
        .btn-secondary:active {
            background: #d97706;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:active {
            background: #059669;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .location-status {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-top: 16px;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">SuiteService</div>
            <h1>App do Técnico</h1>
        </div>
        
        <div class="tecnico-info">
            <select id="selectTecnico" class="select-tecnico">
                <option value="TEC_001">Dimas (TEC_001)</option>
                <option value="TEC_002">Carlos (TEC_002)</option>
                <option value="TEC_003">Roberto (TEC_003)</option>
                <option value="TEC_004">Marcos (TEC_004)</option>
            </select>
            <input type="text" id="inputOS" class="os-input" placeholder="Número da OS (ex: 1898459)" value="1898459">
        </div>
        
        <div id="statusDisplay" class="status-badge">
            📍 Aguardando ação...
        </div>
        
        <div class="actions">
            <button id="btnCaminho" class="btn btn-primary">🏍️ Estou a caminho</button>
            <button id="btnAtendimento" class="btn btn-secondary" disabled>🔧 Em atendimento</button>
            <button id="btnConcluir" class="btn btn-success" disabled>✅ Concluir atendimento</button>
        </div>
        
        <div id="locationStatus" class="location-status">
            GPS: aguardando permissão...
        </div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // Configuração
        const API_BASE = 'https://motor-opt.onrender.com/v1/rastreamento';
        let currentPosition = null;
        let currentOS = document.getElementById('inputOS').value;
        let currentTecnico = document.getElementById('selectTecnico').value;
        let watchId = null;
        let currentStatus = null; // 'a_caminho', 'em_atendimento', null
        
        // Elementos DOM
        const statusDisplay = document.getElementById('statusDisplay');
        const locationStatus = document.getElementById('locationStatus');
        const errorMsg = document.getElementById('errorMsg');
        const btnCaminho = document.getElementById('btnCaminho');
        const btnAtendimento = document.getElementById('btnAtendimento');
        const btnConcluir = document.getElementById('btnConcluir');
        const inputOS = document.getElementById('inputOS');
        const selectTecnico = document.getElementById('selectTecnico');
        
        // Atualiza variáveis quando mudar
        inputOS.addEventListener('input', () => currentOS = inputOS.value);
        selectTecnico.addEventListener('change', () => currentTecnico = selectTecnico.value);
        
        // Função para enviar requisição à API
        async function callAPI(endpoint, body) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!response.ok) throw new Error(`Erro ${response.status}`);
                return await response.json();
            } catch (e) {
                errorMsg.innerText = `Erro: ${e.message}`;
                throw e;
            }
        }
        
        // Obter localização atual
        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocalização não suportada'));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentPosition = {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            precisao: pos.coords.accuracy
                        };
                        locationStatus.innerText = `GPS: ${currentPosition.lat.toFixed(5)}, ${currentPosition.lon.toFixed(5)} (±${currentPosition.precisao.toFixed(0)}m)`;
                        errorMsg.innerText = '';
                        resolve(currentPosition);
                    },
                    (err) => {
                        locationStatus.innerText = `GPS: Erro - ${err.message}`;
                        errorMsg.innerText = 'Permita o acesso à localização.';
                        reject(err);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }
        
        // Iniciar watch (envio periódico)
        function startWatch() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (!navigator.geolocation) return;
            
            watchId = navigator.geolocation.watchPosition(
                async (pos) => {
                    currentPosition = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        precisao: pos.coords.accuracy
                    };
                    locationStatus.innerText = `GPS: ${currentPosition.lat.toFixed(5)}, ${currentPosition.lon.toFixed(5)}`;
                    
                    // Enviar atualização para API apenas se estiver em deslocamento ou atendimento
                    if (currentStatus === 'a_caminho' || currentStatus === 'em_atendimento') {
                        try {
                            await callAPI('/atualizar', {
                                id_tecnico: currentTecnico,
                                lat: currentPosition.lat,
                                lon: currentPosition.lon,
                                id_os: currentOS,
                                precisao: currentPosition.precisao
                            });
                            console.log('Localização enviada');
                        } catch (e) {
                            console.warn('Falha ao enviar localização');
                        }
                    }
                },
                (err) => {
                    locationStatus.innerText = `GPS: Erro - ${err.message}`;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
        
        // Atualizar UI conforme status
        function setUIStatus(status) {
            currentStatus = status;
            if (status === 'a_caminho') {
                statusDisplay.innerHTML = '🏍️ <strong>A caminho</strong> da OS ' + currentOS;
                btnCaminho.disabled = true;
                btnAtendimento.disabled = false;
                btnConcluir.disabled = true;
            } else if (status === 'em_atendimento') {
                statusDisplay.innerHTML = '🔧 <strong>Em atendimento</strong> na OS ' + currentOS;
                btnCaminho.disabled = true;
                btnAtendimento.disabled = true;
                btnConcluir.disabled = false;
            } else {
                statusDisplay.innerHTML = '📋 <strong>Livre</strong> · Pronto para nova OS';
                btnCaminho.disabled = false;
                btnAtendimento.disabled = true;
                btnConcluir.disabled = true;
                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
            }
        }
        
        // Handlers dos botões
        btnCaminho.addEventListener('click', async () => {
            if (!currentOS) {
                errorMsg.innerText = 'Informe o número da OS';
                return;
            }
            try {
                const pos = await getCurrentPosition();
                await callAPI('/iniciar', {
                    id_tecnico: currentTecnico,
                    id_os: currentOS,
                    lat: pos.lat,
                    lon: pos.lon,
                    precisao: pos.precisao
                });
                setUIStatus('a_caminho');
                startWatch();
                errorMsg.innerText = '';
            } catch (e) {
                // erro já tratado
            }
        });
        
        btnAtendimento.addEventListener('click', async () => {
            try {
                const pos = await getCurrentPosition();
                await callAPI('/status', {
                    id_tecnico: currentTecnico,
                    id_os: currentOS,
                    novo_status: 'em_atendimento',
                    lat: pos.lat,
                    lon: pos.lon
                });
                setUIStatus('em_atendimento');
                errorMsg.innerText = '';
            } catch (e) {}
        });
        
        btnConcluir.addEventListener('click', async () => {
            try {
                const pos = await getCurrentPosition();
                await callAPI('/status', {
                    id_tecnico: currentTecnico,
                    id_os: currentOS,
                    novo_status: 'concluido',
                    lat: pos.lat,
                    lon: pos.lon
                });
                // Limpar watch e voltar ao estado livre
                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                setUIStatus(null);
                currentOS = '';
                inputOS.value = '';
                statusDisplay.innerHTML = '✅ Atendimento concluído! Pronto para próxima OS.';
                setTimeout(() => setUIStatus(null), 3000);
                errorMsg.innerText = '';
            } catch (e) {}
        });
        
        // Solicitar permissão de GPS ao carregar
        window.onload = () => {
            getCurrentPosition().catch(() => {});
        };
    </script>
</body>
</html>
